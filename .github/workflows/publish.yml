name: Publish

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    # OIDC trust: no NPM_TOKEN required. npm verifies the workflow identity
    # against the "Trusted Publisher" config on npmjs.com for this package.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit
      - run: pnpm test
      - run: pnpm build

      # npm 11.5.1+ auto-detects OIDC env vars and uses them for auth.
      # --provenance attaches a signed attestation linking the publish to
      # this exact workflow run (visible on the npm package page).
      - name: Publish to npm
        run: npm publish --access public --provenance
